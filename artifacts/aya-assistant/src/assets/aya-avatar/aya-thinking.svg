<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60D5E8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Soft glow background -->
  <circle cx="128" cy="128" r="120" fill="url(#glowGradient)" />
  
  <!-- Head (tilted slightly) -->
  <circle cx="128" cy="105" r="45" fill="#F5D5B8" transform="rotate(-5 128 105)"/>
  
  <!-- Hair -->
  <path d="M 83 105 Q 83 60 128 60 Q 173 60 173 105" fill="#1A3A52" transform="rotate(-5 128 105)"/>
  
  <!-- Hair accent (AI-blue gradient) -->
  <path d="M 145 70 Q 150 65 160 75 Q 162 85 158 100 Q 152 90 145 80" fill="#4A90E2" opacity="0.8" transform="rotate(-5 128 105)"/>
  <path d="M 165 90 Q 175 100 172 120 Q 165 110 160 100" fill="#60D5E8" opacity="0.6" transform="rotate(-5 128 105)"/>
  
  <!-- Left eye (thoughtful) -->
  <circle cx="110" cy="92" r="7" fill="white" transform="rotate(-5 128 105)"/>
  <circle cx="110" cy="95" r="4" fill="#8B6F47" transform="rotate(-5 128 105)"/>
  <circle cx="111" cy="91" r="1.5" fill="white" transform="rotate(-5 128 105)"/>
  
  <!-- Right eye (looking up/thinking) -->
  <circle cx="146" cy="88" r="7" fill="white" transform="rotate(-5 128 105)"/>
  <circle cx="146" cy="89" r="4" fill="#8B6F47" transform="rotate(-5 128 105)"/>
  <circle cx="147" cy="85" r="1.5" fill="white" transform="rotate(-5 128 105)"/>
  
  <!-- Mouth (thinking) -->
  <path d="M 115 125 Q 128 130 141 125" stroke="#D4A373" stroke-width="2" fill="none" stroke-linecap="round" transform="rotate(-5 128 105)"/>
  
  <!-- Body -->
  <rect x="90" y="150" width="76" height="70" rx="10" fill="#10B981"/>
  
  <!-- Tech accent on chest (subtle glow) -->
  <circle cx="128" cy="165" r="6" fill="#4A90E2" opacity="0.6"/>
  <circle cx="128" cy="165" r="4" fill="#60D5E8" opacity="0.4"/>
  
  <!-- Thinking indicator -->
  <circle cx="158" cy="75" r="3" fill="#D4A373" opacity="0.7"/>
  <circle cx="165" cy="65" r="2.5" fill="#D4A373" opacity="0.5"/>
  
  <!-- Soft glow around figure -->
  <circle cx="128" cy="165" r="115" fill="none" stroke="#4A90E2" stroke-width="1" opacity="0.2"/>
</svg>
