<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Thought bubbles -->
  <circle cx="95" cy="25" r="12" fill="#E1F5FE" stroke="#90CAF9" stroke-width="1.5"/>
  <circle cx="106" cy="16" r="7" fill="#E1F5FE" stroke="#90CAF9" stroke-width="1.5"/>
  <circle cx="113" cy="10" r="4" fill="#E1F5FE" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="89" y="29" font-size="11">💭</text>
  <!-- Background circle -->
  <circle cx="58" cy="68" r="52" fill="#F3E5F5"/>
  <!-- Curly hair -->
  <ellipse cx="58" cy="28" rx="38" ry="22" fill="#5D3A1A"/>
  <circle cx="24" cy="41" r="13" fill="#5D3A1A"/>
  <circle cx="92" cy="41" r="13" fill="#5D3A1A"/>
  <circle cx="16" cy="55" r="10" fill="#5D3A1A"/>
  <circle cx="100" cy="55" r="10" fill="#5D3A1A"/>
  <circle cx="38" cy="17" r="9" fill="#5D3A1A"/>
  <circle cx="58" cy="13" r="9" fill="#5D3A1A"/>
  <circle cx="78" cy="17" r="9" fill="#5D3A1A"/>
  <!-- Face -->
  <ellipse cx="58" cy="75" rx="34" ry="38" fill="#FFCC99"/>
  <!-- Glasses frame -->
  <rect x="25" y="65" width="24" height="16" rx="7" stroke="#444" stroke-width="2.5" fill="#E3F2FD" fill-opacity="0.6"/>
  <rect x="67" y="65" width="24" height="16" rx="7" stroke="#444" stroke-width="2.5" fill="#E3F2FD" fill-opacity="0.6"/>
  <line x1="49" y1="73" x2="67" y2="73" stroke="#444" stroke-width="2"/>
  <!-- Thinking eyes - look up-left -->
  <ellipse cx="37" cy="70" rx="5" ry="5.5" fill="#333"/>
  <ellipse cx="79" cy="70" rx="5" ry="5.5" fill="#333"/>
  <circle cx="35" cy="68" r="1.5" fill="white"/>
  <circle cx="77" cy="68" r="1.5" fill="white"/>
  <!-- One raised eyebrow -->
  <path d="M31 59 Q37 55 43 58" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M73 57 Q79 54 85 58" stroke="#5D3A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Nose -->
  <ellipse cx="58" cy="85" rx="3" ry="2" fill="#E8A87C"/>
  <!-- Thinking mouth - slight pout -->
  <path d="M50 93 Q58 91 66 93" stroke="#C0705A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Finger to chin -->
  <rect x="62" y="98" width="6" height="14" rx="3" fill="#FFCC99" stroke="#E8A87C" stroke-width="1"/>
  <circle cx="65" cy="98" r="4" fill="#FFCC99" stroke="#E8A87C" stroke-width="1"/>
  <!-- Cheeks -->
  <ellipse cx="36" cy="86" rx="8" ry="5" fill="#FFB3A7" opacity="0.4"/>
  <ellipse cx="80" cy="86" rx="8" ry="5" fill="#FFB3A7" opacity="0.4"/>
</svg>
