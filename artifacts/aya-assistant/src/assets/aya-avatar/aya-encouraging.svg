<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60D5E8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Soft glow background -->
  <circle cx="128" cy="128" r="120" fill="url(#glowGradient)" />
  
  <!-- Head (leaning forward slightly) -->
  <circle cx="128" cy="102" r="45" fill="#F5D5B8" transform="translate(0, -3)"/>
  
  <!-- Hair -->
  <path d="M 83 100 Q 83 55 128 55 Q 173 55 173 100" fill="#1A3A52" transform="translate(0, -3)"/>
  
  <!-- Hair accent (AI-blue gradient) -->
  <path d="M 145 65 Q 150 60 160 70 Q 162 80 158 95 Q 152 85 145 75" fill="#4A90E2" opacity="0.8" transform="translate(0, -3)"/>
  <path d="M 165 85 Q 175 95 172 115 Q 165 105 160 95" fill="#60D5E8" opacity="0.6" transform="translate(0, -3)"/>
  
  <!-- Left eye (warm caring) -->
  <circle cx="110" cy="90" r="8" fill="white" transform="translate(0, -3)"/>
  <circle cx="110" cy="92" r="5" fill="#D4A373" transform="translate(0, -3)"/>
  <circle cx="112" cy="89" r="2" fill="white" transform="translate(0, -3)"/>
  
  <!-- Right eye (warm caring) -->
  <circle cx="146" cy="90" r="8" fill="white" transform="translate(0, -3)"/>
  <circle cx="146" cy="92" r="5" fill="#D4A373" transform="translate(0, -3)"/>
  <circle cx="148" cy="89" r="2" fill="white" transform="translate(0, -3)"/>
  
  <!-- Mouth (warm encouraging smile) -->
  <path d="M 110 122 Q 128 133 146 122" stroke="#D4A373" stroke-width="2.5" fill="none" stroke-linecap="round" transform="translate(0, -3)"/>
  <path d="M 112 122 Q 128 130 144 122" fill="#FFD700" opacity="0.3" transform="translate(0, -3)"/>
  
  <!-- Body (open posture) -->
  <rect x="90" y="150" width="76" height="70" rx="10" fill="#10B981"/>
  
  <!-- Tech accent on chest (warm glow) -->
  <circle cx="128" cy="165" r="7" fill="#FBBF24" opacity="0.5"/>
  <circle cx="128" cy="165" r="5" fill="#60D5E8" opacity="0.6"/>
  
  <!-- Caring gesture - subtle rays -->
  <line x1="128" y1="145" x2="128" y2="135" stroke="#FBBF24" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="140" y1="150" x2="148" y2="144" stroke="#FBBF24" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="116" y1="150" x2="108" y2="144" stroke="#FBBF24" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Soft glow around figure (warm) -->
  <circle cx="128" cy="165" r="115" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.25"/>
</svg>
