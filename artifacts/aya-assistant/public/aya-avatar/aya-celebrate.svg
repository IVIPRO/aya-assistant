<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Confetti -->
  <rect x="8" y="8" width="7" height="7" rx="2" fill="#FF5252" transform="rotate(20 8 8)"/>
  <rect x="100" y="12" width="7" height="7" rx="2" fill="#FFEB3B" transform="rotate(-15 100 12)"/>
  <rect x="18" y="20" width="5" height="5" rx="1" fill="#40C4FF" transform="rotate(35 18 20)"/>
  <rect x="90" y="22" width="5" height="5" rx="1" fill="#69F0AE" transform="rotate(-25 90 22)"/>
  <text x="50" y="12" font-size="14">🎉</text>
  <!-- Background circle -->
  <circle cx="60" cy="70" r="52" fill="#FFF9C4"/>
  <!-- Curly hair - bouncy -->
  <ellipse cx="60" cy="30" rx="38" ry="22" fill="#5D3A1A"/>
  <circle cx="26" cy="43" r="13" fill="#5D3A1A"/>
  <circle cx="94" cy="43" r="13" fill="#5D3A1A"/>
  <circle cx="18" cy="57" r="10" fill="#5D3A1A"/>
  <circle cx="102" cy="57" r="10" fill="#5D3A1A"/>
  <circle cx="40" cy="19" r="9" fill="#5D3A1A"/>
  <circle cx="60" cy="15" r="10" fill="#5D3A1A"/>
  <circle cx="80" cy="19" r="9" fill="#5D3A1A"/>
  <!-- Face -->
  <ellipse cx="60" cy="77" rx="34" ry="38" fill="#FFCC99"/>
  <!-- Glasses frame -->
  <rect x="27" y="67" width="24" height="16" rx="7" stroke="#444" stroke-width="2.5" fill="#E3F2FD" fill-opacity="0.6"/>
  <rect x="69" y="67" width="24" height="16" rx="7" stroke="#444" stroke-width="2.5" fill="#E3F2FD" fill-opacity="0.6"/>
  <line x1="51" y1="75" x2="69" y2="75" stroke="#444" stroke-width="2"/>
  <!-- Celebration squint-smile eyes -->
  <path d="M34 74 Q39 68 44 74" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M76 74 Q81 68 86 74" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Eyebrows up high -->
  <path d="M31 62 Q39 57 47 62" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M73 62 Q81 57 89 62" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Nose -->
  <ellipse cx="60" cy="87" rx="3" ry="2" fill="#E8A87C"/>
  <!-- Big open celebration smile -->
  <path d="M45 97 Q60 113 75 97" stroke="#C0705A" stroke-width="2.5" stroke-linecap="round" fill="#FF8A80"/>
  <!-- Stars around head -->
  <text x="3" y="75" font-size="12">⭐</text>
  <text x="101" y="75" font-size="12">⭐</text>
  <!-- Cheeks very bright -->
  <ellipse cx="38" cy="91" rx="10" ry="7" fill="#FF5252" opacity="0.55"/>
  <ellipse cx="82" cy="91" rx="10" ry="7" fill="#FF5252" opacity="0.55"/>
</svg>
