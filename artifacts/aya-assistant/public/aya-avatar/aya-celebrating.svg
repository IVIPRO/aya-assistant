<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  
  <!-- Celebratory glow background -->
  <circle cx="128" cy="128" r="120" fill="url(#glowGradient)" />
  
  <!-- Head (slightly raised) -->
  <circle cx="128" cy="95" r="45" fill="#F5D5B8" transform="translate(0, -8)"/>
  
  <!-- Hair -->
  <path d="M 83 100 Q 83 55 128 55 Q 173 55 173 100" fill="#1A3A52" transform="translate(0, -8)"/>
  
  <!-- Hair accent (glowing AI-blue) -->
  <path d="M 145 65 Q 150 60 160 70 Q 162 80 158 95 Q 152 85 145 75" fill="#4A90E2" opacity="0.9" transform="translate(0, -8)"/>
  <path d="M 165 85 Q 175 95 172 115 Q 165 105 160 95" fill="#60D5E8" opacity="0.8" transform="translate(0, -8)"/>
  
  <!-- Left eye (happy closed celebratory) -->
  <ellipse cx="110" cy="85" rx="8" ry="7" fill="white" transform="translate(0, -8)"/>
  <path d="M 104 87 Q 110 93 116 87" stroke="#8B6F47" stroke-width="2.5" fill="none" transform="translate(0, -8)"/>
  <circle cx="112" cy="84" r="1.5" fill="#8B6F47" transform="translate(0, -8)"/>
  
  <!-- Right eye (happy closed celebratory) -->
  <ellipse cx="146" cy="85" rx="8" ry="7" fill="white" transform="translate(0, -8)"/>
  <path d="M 140 87 Q 146 93 152 87" stroke="#8B6F47" stroke-width="2.5" fill="none" transform="translate(0, -8)"/>
  <circle cx="148" cy="84" r="1.5" fill="#8B6F47" transform="translate(0, -8)"/>
  
  <!-- Mouth (big celebratory smile) -->
  <path d="M 108 120 Q 128 138 148 120" stroke="#D4A373" stroke-width="3" fill="none" stroke-linecap="round" transform="translate(0, -8)"/>
  <path d="M 110 120 Q 128 135 146 120" fill="#FFD700" opacity="0.35" transform="translate(0, -8)"/>
  
  <!-- Body (celebratory pose) -->
  <rect x="90" y="150" width="76" height="70" rx="10" fill="#10B981" transform="translate(0, -5)"/>
  
  <!-- Tech accent on chest (bright celebration glow) -->
  <circle cx="128" cy="160" r="8" fill="#FFD700" opacity="0.7"/>
  <circle cx="128" cy="160" r="6" fill="#60D5E8" opacity="0.7"/>
  <circle cx="128" cy="160" r="4" fill="#F8F8F8" opacity="0.6"/>
  
  <!-- Celebration rays/stars -->
  <polygon points="128,60 135,75 150,75 138,85 143,100 128,90 113,100 118,85 106,75 121,75" fill="#FFD700" opacity="0.6" transform="translate(0, -8)"/>
  
  <!-- Side celebration sparkles -->
  <circle cx="85" cy="100" r="2.5" fill="#FBBF24" opacity="0.7"/>
  <circle cx="95" cy="75" r="2" fill="#FBBF24" opacity="0.5"/>
  <circle cx="171" cy="100" r="2.5" fill="#FBBF24" opacity="0.7"/>
  <circle cx="161" cy="75" r="2" fill="#FBBF24" opacity="0.5"/>
  
  <!-- Bright celebratory glow -->
  <circle cx="128" cy="160" r="120" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  <circle cx="128" cy="160" r="105" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.25"/>
</svg>
