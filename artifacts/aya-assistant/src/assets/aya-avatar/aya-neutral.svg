<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60D5E8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Soft glow background -->
  <circle cx="128" cy="128" r="120" fill="url(#glowGradient)" />
  
  <!-- Head -->
  <circle cx="128" cy="100" r="45" fill="#F5D5B8"/>
  
  <!-- Hair -->
  <path d="M 83 100 Q 83 55 128 55 Q 173 55 173 100" fill="#1A3A52"/>
  
  <!-- Hair accent (AI-blue gradient) -->
  <path d="M 145 65 Q 150 60 160 70 Q 162 80 158 95 Q 152 85 145 75" fill="#4A90E2" opacity="0.8"/>
  <path d="M 165 85 Q 175 95 172 115 Q 165 105 160 95" fill="#60D5E8" opacity="0.6"/>
  
  <!-- Left eye -->
  <circle cx="110" cy="90" r="8" fill="white"/>
  <circle cx="110" cy="92" r="5" fill="#8B6F47"/>
  <circle cx="112" cy="89" r="2" fill="white"/>
  
  <!-- Right eye -->
  <circle cx="146" cy="90" r="8" fill="white"/>
  <circle cx="146" cy="92" r="5" fill="#8B6F47"/>
  <circle cx="148" cy="89" r="2" fill="white"/>
  
  <!-- Mouth (neutral) -->
  <path d="M 115 120 Q 128 128 141 120" stroke="#D4A373" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="90" y="150" width="76" height="70" rx="10" fill="#10B981"/>
  
  <!-- Tech accent on chest -->
  <circle cx="128" cy="165" r="6" fill="#4A90E2" opacity="0.7"/>
  <circle cx="128" cy="165" r="4" fill="#60D5E8" opacity="0.5"/>
  
  <!-- Soft glow around figure -->
  <circle cx="128" cy="165" r="115" fill="none" stroke="#4A90E2" stroke-width="1" opacity="0.2"/>
</svg>
